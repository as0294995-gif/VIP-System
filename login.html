<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP ERP | Login</title>

<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="background">

<div class="shape shape1"></div>

<div class="shape shape2"></div>

</div>

<div class="login-container">

<div class="left-side">

<div class="brand">

<h1>VIP ERP</h1>

<p>

برنامج إدارة متكامل للمبيعات والمخازن والحسابات

</p>

</div>

<div class="features">

<div class="item">

<i class="fa-solid fa-chart-line"></i>

<span>تقارير لحظية</span>

</div>

<div class="item">

<i class="fa-solid fa-box"></i>

<span>إدارة المخزون</span>

</div>

<div class="item">

<i class="fa-solid fa-cash-register"></i>

<span>شاشة كاشير احترافية</span>

</div>

<div class="item">

<i class="fa-solid fa-shield-halved"></i>

<span>صلاحيات المستخدمين</span>

</div>

</div>

</div>

<div class="right-side">

<div class="login-box">

<h2>تسجيل الدخول</h2>

<p>

أدخل بيانات الدخول للمتابعة

</p>

<form id="loginForm">

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input

type="text"

id="username"

placeholder="اسم المستخدم"

required

>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input

type="password"

id="password"

placeholder="كلمة المرور"

required

>

</div>
<div class="options">

<label>

<input type="checkbox">

تذكرني

</label>

<a href="#">

نسيت كلمة المرور؟

</a>

</div>

<button type="submit" class="login-btn">

<i class="fa-solid fa-right-to-bracket"></i>

تسجيل الدخول

</button>

</form>

<div class="divider">

<span>أو</span>

</div>

<div class="quick-login">

<button class="google">

<i class="fa-brands fa-google"></i>

Google

</button>

<button class="microsoft">

<i class="fa-brands fa-microsoft"></i>

Microsoft

</button>

</div>

<div class="version">

VIP ERP v1.0

</div>

</div>

</div>

</div>

<script src="js/login.js"></script>

</body>

</html>
